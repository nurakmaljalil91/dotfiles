########################################################################################
# HYPRLAND CONFIG FOR NVIDIA HYBRID (INTEL + NVIDIA)
########################################################################################

# --- Environment Variables ---
# Use Intel media decode for browsers/video. renderD128 is NVIDIA on this laptop;
# renderD129 is the Intel iGPU, which is the stable VA-API path for YouTube.
env = LIBVA_DRIVER_NAME,iHD
env = LIBVA_DRM_DEVICE,/dev/dri/renderD129
# env = NVD_BACKEND,direct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = WLR_NO_HARDWARE_CURSORS,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XDG_SESSION_TYPE,wayland

# --- Monitor ---
# Change 'preferred' or 'auto' if you have specific resolution needs
monitor=,preferred,auto,1

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    # This helps with flickering on Nvidia
    allow_tearing = false
}

# --- Decoration ---
decoration {
    rounding = 10
    
    # Shadows can cause gray boxes on hybrid graphics, keep disabled if issues persist
    shadow {
        enabled = false
    }

    blur {
        enabled = false # Keep false to stop workspace flickering
        size = 3
        passes = 1
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 4, default, slide
}

# --- Misc (This removes the Gray Warning Bar) ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    # This prevents the "red/gray bar" from appearing if there's a config error
    # suppress_portal_warnings = true 
}

# --- Cursor ---
cursor {
    no_hardware_cursors = true
}

# --- Keybindings ---
$mainMod = SUPER
$terminal = wezterm
$fileManager = thunar
$menu = rofi -show drun
$browser = google-chrome-stable
$lockSession = sh -c 'if command -v hyprlock >/dev/null 2>&1; then hyprlock; elif command -v swaylock >/dev/null 2>&1; then swaylock; else loginctl lock-session; fi'

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, $lockSession
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $browser

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move active window around in the layout
bind = $mainMod CONTROL, H, swapwindow, l
bind = $mainMod CONTROL, L, swapwindow, r
bind = $mainMod CONTROL, K, swapwindow, u
bind = $mainMod CONTROL, J, swapwindow, d

bind = $mainMod CONTROL, left, swapwindow, l
bind = $mainMod CONTROL, right, swapwindow, r
bind = $mainMod CONTROL, up, swapwindow, u
bind = $mainMod CONTROL, down, swapwindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# Move Workspaces (Shift + H/L)
bind = $mainMod SHIFT, H, workspace, e-1
bind = $mainMod SHIFT, L, workspace, e+1

# Move Workspaces (Shift + arrow keys)
bind = $mainMod SHIFT, left, workspace, e-1
bind = $mainMod SHIFT, right, workspace, e+1

# Clipboard
# Using Ctrl + Alt + V (CONTROL ALT, V)
bind = CONTROL ALT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Brightness (F3 = down, F4 = up — BIOS Action Keys Mode is enabled)
bindel = , F3, exec, swayosd-client --brightness lower
bindel = , F4, exec, swayosd-client --brightness raise

# Volume (BIOS Action Keys Mode — plain F5–F8)
bind   = , F5, exec, swayosd-client --output-volume mute-toggle
bindel = , F6, exec, swayosd-client --output-volume lower
bindel = , F7, exec, swayosd-client --output-volume raise
bind   = , F8, exec, swayosd-client --input-volume mute-toggle

# F9  — keyboard backlight: no device on this machine, unbound
# F10 — Insert key
bind   = , F10, exec, wtype -k insert
# F11 + F12 — Airplane mode toggle
bind   = , F11, exec, bash ~/.config/hypr/scripts/airplane_mode.sh
bind   = , F12, exec, bash ~/.config/hypr/scripts/airplane_mode.sh

# --- Startup ---
exec-once = swayosd-server
exec-once = swaybg -i /usr/share/wallpapers/cachyos-wallpapers/CachyOS_GreenSpace.png -m fill
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store # Stores text data
exec-once = wl-paste --type image --watch cliphist store # Stores image data
