# Reload tmux configuration with prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Enable mouse support
set -g mouse on

# Use vim-like keybindings for pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 30
set -g status-right-length 120

# Theme and status styling
set -g @catppuccin_flavour 'mocha'
set -g status-style "bg=default"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g mode-style "fg=#1e1e2e,bg=#f9e2af,bold"

# Window tabs
set -g window-status-separator ""
set -g window-status-format "#[fg=#a6adc8,bg=#313244] #I #[fg=#bac2de,bg=#313244]#{=/18/...:#W}#[fg=#313244,bg=default]"
set -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I #[fg=#1e1e2e,bg=#89b4fa,bold]#{=/24/...:#W}#[fg=#89b4fa,bg=default]"
set -g window-status-style "fg=#a6adc8,bg=default"
set -g window-status-current-style "fg=#89b4fa,bg=default"
set -g window-status-activity-style "fg=#f9e2af,bg=default"
set -g window-status-bell-style "fg=#f38ba8,bg=default,bold"

set -g status-left "#[fg=#1e1e2e,bg=#94e2d5,bold]  #S #[fg=#94e2d5,bg=#89b4fa]#[fg=#1e1e2e,bg=#89b4fa] #{host_short} #[fg=#89b4fa,bg=default]"
set -g status-right "#[fg=#313244,bg=default]#[fg=#a6adc8,bg=#313244]  #(git -C \"#{pane_current_path}\" rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^HEAD$/detached/' | cut -c1-24) #[fg=#45475a,bg=#313244]#[fg=#cdd6f4,bg=#45475a]  #(basename \"#{pane_current_path}\") #[fg=#f9e2af,bg=#45475a]#[fg=#1e1e2e,bg=#f9e2af]  %H:%M #[fg=#cba6f7,bg=#f9e2af]#[fg=#1e1e2e,bg=#cba6f7]  %Y-%m-%d #[fg=#cba6f7,bg=default]"

set-option -g status-position bottom

# Fix scrolling: when scrolling up, enter copy mode automatically
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.configurations/tmux/plugins/tpm/tpm'
